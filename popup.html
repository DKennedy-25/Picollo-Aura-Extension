<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Piccolo's Aura Theme</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #080f08;
      color: #b6ffb6;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0a1f0a, #0d2e0d);
      border-bottom: 1px solid #2ecc40;
      padding: 16px 18px 12px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(46,204,64,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: #2ecc40;
      text-shadow: 0 0 12px rgba(46,204,64,0.6);
      line-height: 1;
    }

    .subtitle {
      font-size: 10px;
      color: #4a8a4a;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: #0a140a;
      border-bottom: 1px solid #1a3a1a;
      font-size: 11px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ecc40;
      box-shadow: 0 0 6px #2ecc40;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    .dot.inactive { background: #444; box-shadow: none; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .body { padding: 14px 18px; }

    .episode-info {
      background: #0d1f0d;
      border: 1px solid #1e4a1e;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 11px;
      color: #5aaa5a;
    }

    .episode-info .label { color: #3a6a3a; font-size: 10px; margin-bottom: 3px; }
    .episode-info .value { color: #80cc80; font-size: 12px; word-break: break-all; }

    .timestamps-section { margin-bottom: 14px; }

    .section-title {
      font-size: 10px;
      color: #3a6a3a;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .timestamp-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }

    .timestamp-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d1f0d;
      border: 1px solid #1e3a1e;
      padding: 5px 8px;
      border-radius: 3px;
      font-size: 11px;
    }

    .timestamp-item .range { color: #80cc80; }
    .timestamp-item .duration { color: #3a6a3a; font-size: 10px; }

    .empty-state {
      color: #3a5a3a;
      font-size: 11px;
      padding: 8px 0;
      line-height: 1.5;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .volume-label { font-size: 10px; color: #3a6a3a; width: 50px; }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: #1e4a1e;
      border-radius: 2px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #2ecc40;
      cursor: pointer;
      box-shadow: 0 0 4px #2ecc40;
    }

    .volume-val { font-size: 10px; color: #2ecc40; width: 28px; text-align: right; }

    .test-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid #2ecc40;
      color: #2ecc40;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .test-btn:hover {
      background: rgba(46,204,64,0.1);
      box-shadow: 0 0 10px rgba(46,204,64,0.2);
    }

    .footer {
      border-top: 1px solid #1a3a1a;
      padding: 8px 18px;
      font-size: 9px;
      color: #2a4a2a;
      line-height: 1.5;
    }

    .footer a { color: #3a7a3a; text-decoration: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a140a; }
    ::-webkit-scrollbar-thumb { background: #2a5a2a; border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <div class="title">PICCOLO'S AURA</div>
  <div class="subtitle">CRUNCHYROLL EXTENSION · TIMESTAMP MODE</div>
</div>

<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Checking page...</span>
</div>

<div class="body">

  <div class="episode-info">
    <div class="label">CURRENT EPISODE ID</div>
    <div class="value" id="episode-id">—</div>
  </div>

  <div class="timestamps-section">
    <div class="section-title">Piccolo Timestamps This Episode</div>
    <div class="timestamp-list" id="timestamp-list">
      <div class="empty-state">No timestamps loaded.<br>Open a Crunchyroll episode first.</div>
    </div>
  </div>

  <div class="volume-row">
    <span class="volume-label">VOLUME</span>
    <input type="range" id="volume-slider" min="0" max="100" value="75" />
    <span class="volume-val" id="volume-val">75%</span>
  </div>

  <button class="test-btn" id="test-btn">▶ TEST AUDIO</button>

</div>

<div class="footer">
  Add timestamps in <strong>timestamps.js</strong> · Drop <strong>aura.mp3</strong> in extension folder
</div>

<script src="timestamps.js"></script>
<script src="popup.js"></script>
</body>
</html>
